version: 2

sources:
  - name: raw
    database: CUSTOMER_PLATFORM
    schema: RAW
    loaded_at_field: _LOADED_AT

    freshness:
      warn_after: {count: 25, period: hour}
      error_after: {count: 49, period: hour}

    tables:
      - name: customers
        description: "Customer profile records loaded from S3"
        columns:
          - name: CUSTOMER_ID
            description: "Unique customer identifier"
            tests:
              - unique
              - not_null
          - name: EMAIL
            tests:
              - not_null
          - name: SIGNUP_DATE
            tests:
              - not_null
          - name: LOYALTY_TIER
            tests:
              - accepted_values:
                  values: ['bronze', 'silver', 'gold', 'platinum']
                  severity: warn

      - name: orders
        description: "Order header records"
        columns:
          - name: ORDER_ID
            tests:
              - unique
              - not_null
          - name: CUSTOMER_ID
            tests:
              - not_null
          - name: ORDER_DATE
            tests:
              - not_null
          - name: ORDER_STATUS
            tests:
              - accepted_values:
                  values: ['pending','confirmed','shipped','delivered','cancelled','returned']

      - name: order_items
        description: "Order line items"
        columns:
          - name: ORDER_ITEM_ID
            tests:
              - unique
              - not_null
          - name: ORDER_ID
            tests:
              - not_null
          - name: PRODUCT_ID
            tests:
              - not_null

      - name: transactions
        description: "Payment transaction events"
        freshness:
          warn_after: {count: 2, period: hour}
          error_after: {count: 6, period: hour}
        columns:
          - name: TRANSACTION_ID
            tests:
              - unique
              - not_null
          - name: CUSTOMER_ID
            tests:
              - not_null
          - name: PAYMENT_STATUS
            tests:
              - accepted_values:
                  values: ['authorized','failed','refunded','chargeback','pending']

      - name: clickstream
        description: "User behavioral events"
        freshness:
          warn_after: {count: 2, period: hour}
          error_after: {count: 6, period: hour}
        columns:
          - name: EVENT_ID
            tests:
              - unique
              - not_null
          - name: EVENT_TIMESTAMP
            tests:
              - not_null

      - name: campaigns
        description: "Marketing campaign responses"
        columns:
          - name: CAMPAIGN_RESPONSE_ID
            tests:
              - unique
              - not_null
          - name: CUSTOMER_ID
            tests:
              - not_null

      - name: products
        description: "Product catalog"
        columns:
          - name: PRODUCT_ID
            tests:
              - unique
              - not_null
          - name: BASE_PRICE
            tests:
              - not_null